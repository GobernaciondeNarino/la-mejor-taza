<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<meta name="color-scheme" content="light"/>
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://www.gstatic.com https://cdnjs.cloudflare.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com data:;
  img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://firebasestorage.googleapis.com;
  connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
  frame-ancestors 'self';
  base-uri 'self';
  form-action 'self';
  object-src 'none';
"/>
<title>La Mejor Taza — Pasaporte del Café de Nariño</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css"/>
<style>
  body { overflow: hidden; }
  #root { height: 100vh; overflow: hidden; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }
  /* Capa para Three.js */
  .lmt-three-wrap { position: relative; }
  .lmt-three-wrap > *:not(canvas) { position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Datos demo (fallback si Firebase no está configurado) -->
<script src="data/stands.js"></script>

<!-- Utilidades de seguridad -->
<script src="js/security.js"></script>

<!-- Three.js (animaciones) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js" crossorigin="anonymous"></script>
<script src="js/three-background.js"></script>

<!-- Wiring Firebase (módulo ESM, opcional). Si no hay firebase-config.js, queda en modo demo. -->
<script type="module" src="js/firebase.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Shared.jsx"></script>
<script type="text/babel" src="components/PhoneFrame.jsx"></script>
<script type="text/babel" src="components/Admin.jsx"></script>
<script type="text/babel" src="components/QRPrint.jsx"></script>
<script type="text/babel" src="components/VoteFlow.jsx"></script>
<script type="text/babel" src="components/Passport.jsx"></script>
<script type="text/babel" src="components/Dashboard.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "palette": "nariño",
  "accent": "galeras"
}/*EDITMODE-END*/;

const PALETTES = {
  "nariño":  { grano: "oklch(0.42 0.09 50)",  galeras: "oklch(0.55 0.13 30)",  cafeto: "oklch(0.5 0.08 145)", paper: "oklch(0.97 0.015 75)", ink: "oklch(0.22 0.02 60)" },
  "arena":   { grano: "oklch(0.45 0.08 70)",  galeras: "oklch(0.58 0.11 50)",  cafeto: "oklch(0.52 0.07 130)", paper: "oklch(0.96 0.02 85)",  ink: "oklch(0.22 0.02 70)" },
  "niebla":  { grano: "oklch(0.35 0.02 250)", galeras: "oklch(0.55 0.14 15)",  cafeto: "oklch(0.55 0.08 160)", paper: "oklch(0.97 0.005 250)", ink: "oklch(0.2 0.015 250)" },
  "mercado": { grano: "oklch(0.4 0.12 30)",   galeras: "oklch(0.6 0.17 45)",   cafeto: "oklch(0.55 0.11 130)", paper: "oklch(0.96 0.025 80)", ink: "oklch(0.22 0.03 50)" },
};

const applyPalette = (name) => {
  const p = PALETTES[name] || PALETTES["nariño"];
  const r = document.documentElement.style;
  r.setProperty("--grano", p.grano);
  r.setProperty("--galeras", p.galeras);
  r.setProperty("--cafeto", p.cafeto);
  r.setProperty("--paper", p.paper);
  r.setProperty("--ink", p.ink);
};

const NAV_ITEMS = [
  { id: "login",     label: "Login Admin",       group: "Administrador" },
  { id: "stands",    label: "Registro de stands",group: "Administrador" },
  { id: "editor",    label: "Nuevo / editar",    group: "Administrador" },
  { id: "qr",        label: "QR imprimible",     group: "Administrador" },
  { id: "live",      label: "Actividad live",    group: "Administrador" },
  { id: "vote",      label: "Formulario de voto",group: "Usuario · móvil" },
  { id: "confirm",   label: "Confirmación",      group: "Usuario · móvil" },
  { id: "passport",  label: "Pasaporte (libreta)",group: "Usuario · móvil" },
  { id: "dashboard", label: "Dashboard público", group: "Público" },
  { id: "detail",    label: "Detalle de stand",  group: "Público" },
];

const App = () => {
  const [screen, setScreen] = React.useState(() => localStorage.getItem("lmt.screen") || "dashboard");
  const [adminTab, setAdminTab] = React.useState("stands");
  const [selectedStand, setSelectedStand] = React.useState("st-08");
  const [editingStand, setEditingStand] = React.useState(null);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [palette, setPalette] = React.useState(TWEAKS.palette);
  const [, setDataTick] = React.useState(0);

  React.useEffect(() => { localStorage.setItem("lmt.screen", screen); }, [screen]);
  React.useEffect(() => { applyPalette(palette); }, [palette]);

  // Re-render cuando Firestore (o el fallback demo) emite nuevos datos.
  React.useEffect(() => {
    const onData = () => setDataTick((t) => t + 1);
    window.addEventListener("lmt:data", onData);
    return () => window.removeEventListener("lmt:data", onData);
  }, []);

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const setPaletteAndPersist = (p) => {
    setPalette(p);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { palette: p } }, "*");
  };

  const stand = STANDS_DATA.find(s => s.id === selectedStand) || STANDS_DATA[0];

  const renderScreen = () => {
    switch (screen) {
      case "login":
        return <LoginAdmin onLogin={() => setScreen("stands")}/>;
      case "stands":
        return (
          <AdminShell active="stands" setActive={setAdminTab}>
            <StandsList stands={STANDS_DATA} selected={selectedStand}
              onSelect={id => { setSelectedStand(id); setEditingStand(STANDS_DATA.find(s => s.id === id)); setScreen("editor"); }}
              onNuevo={() => { setEditingStand(null); setScreen("editor"); }}/>
          </AdminShell>
        );
      case "editor":
        return (
          <AdminShell active="stands" setActive={setAdminTab}>
            <StandEditor stand={editingStand} onClose={() => setScreen("stands")} onSave={() => setScreen("qr")}/>
          </AdminShell>
        );
      case "qr":
        return (
          <AdminShell active="qr" setActive={setAdminTab}>
            <QRPrintView stands={STANDS_DATA}/>
          </AdminShell>
        );
      case "live":
        return (
          <AdminShell active="live" setActive={setAdminTab}>
            <ActivityLive stands={STANDS_DATA} comentarios={COMENTARIOS_DEMO}/>
          </AdminShell>
        );
      case "vote":
        return (
          <MobileStage>
            <PhoneFrame label="Formulario al escanear QR">
              <VoteForm stand={stand} onComplete={() => setScreen("confirm")}/>
            </PhoneFrame>
          </MobileStage>
        );
      case "confirm":
        return (
          <MobileStage>
            <PhoneFrame label="Pasaporte sellado">
              <VoteConfirm stand={stand}
                onGoPassport={() => setScreen("passport")}
                onGoDashboard={() => setScreen("dashboard")}/>
            </PhoneFrame>
          </MobileStage>
        );
      case "passport":
        return (
          <MobileStage>
            <PhoneFrame label="Pasaporte · libreta">
              <Passport stands={STANDS_DATA} passport={PASAPORTE_DEMO} onBack={() => setScreen("dashboard")}/>
            </PhoneFrame>
          </MobileStage>
        );
      case "dashboard":
        return <PublicDashboard stands={STANDS_DATA} comentarios={COMENTARIOS_DEMO}
          onDetail={id => { setSelectedStand(id); setScreen("detail"); }}/>;
      case "detail":
        return <PublicDetail stand={stand} comentarios={COMENTARIOS_DEMO} allStands={STANDS_DATA}
          onBack={() => setScreen("dashboard")} onVote={() => setScreen("vote")}/>;
      default:
        return null;
    }
  };

  return (
    <div style={{ height: "100vh", display: "grid", gridTemplateColumns: "220px 1fr", background: "var(--paper)" }}>
      {/* Navegación lateral de prototipos */}
      <nav style={{
        background: "oklch(0.18 0.01 60)",
        color: "var(--paper)",
        padding: "20px 16px",
        overflow: "auto",
        display: "flex", flexDirection: "column", gap: 16,
      }}>
        <div style={{ color: "var(--paper)" }}>
          <div style={{ fontFamily: "var(--font-display)", fontStyle: "italic", fontSize: 20, lineHeight: 1 }}>La Mejor Taza</div>
          <div className="mono" style={{ color: "oklch(0.7 0.01 60)", marginTop: 4, fontSize: 9 }}>Prototipo · Festival Nariño</div>
        </div>
        {["Administrador", "Usuario · móvil", "Público"].map(group => (
          <div key={group}>
            <div className="mono" style={{ color: "oklch(0.55 0.01 60)", marginBottom: 6, fontSize: 9 }}>{group}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
              {NAV_ITEMS.filter(n => n.group === group).map(n => (
                <button key={n.id} onClick={() => setScreen(n.id)} style={{
                  padding: "7px 10px",
                  textAlign: "left",
                  borderRadius: 4,
                  fontSize: 12,
                  background: screen === n.id ? "var(--galeras)" : "transparent",
                  color: screen === n.id ? "var(--paper)" : "oklch(0.85 0.01 60)",
                  fontWeight: screen === n.id ? 500 : 400,
                }}>{n.label}</button>
              ))}
            </div>
          </div>
        ))}
        <div style={{ marginTop: "auto", color: "oklch(0.55 0.01 60)", fontSize: 10, lineHeight: 1.5 }}>
          <div className="mono" style={{ color: "oklch(0.7 0.01 60)", fontSize: 9, marginBottom: 6 }}>Datos</div>
          JSON local · {STANDS_DATA.length} stands<br/>
          En producción: Firebase/Firestore
        </div>
      </nav>

      <main style={{ overflow: "auto", position: "relative" }}>
        {renderScreen()}

        {/* Tweaks */}
        {tweaksOpen && (
          <div style={{
            position: "fixed", bottom: 20, right: 20,
            width: 260, background: "var(--paper)",
            border: "1px solid var(--line)", borderRadius: "var(--r-md)",
            padding: 20, boxShadow: "var(--shadow-2)", zIndex: 1000,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div className="mono">Tweaks</div>
              <button onClick={() => setTweaksOpen(false)} style={{ color: "var(--ink-3)" }}>×</button>
            </div>
            <div className="mono" style={{ marginBottom: 8 }}>Paleta</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {Object.keys(PALETTES).map(p => (
                <button key={p} onClick={() => setPaletteAndPersist(p)} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "8px 10px",
                  borderRadius: 6,
                  border: palette === p ? "1px solid var(--ink)" : "1px solid var(--line)",
                  background: palette === p ? "var(--paper-2)" : "var(--paper)",
                  textAlign: "left",
                }}>
                  <span style={{ display: "flex", gap: 3 }}>
                    {["grano","galeras","cafeto","ink"].map(k => (
                      <span key={k} style={{ width: 12, height: 12, borderRadius: "50%", background: PALETTES[p][k] }}/>
                    ))}
                  </span>
                  <span style={{ fontSize: 12, fontWeight: palette === p ? 500 : 400, textTransform: "capitalize" }}>{p}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

// Fondo con textura para vistas móviles
const MobileStage = ({ children }) => (
  <div style={{
    minHeight: "100%",
    padding: 40,
    display: "flex", alignItems: "center", justifyContent: "center",
    background: "var(--paper-2)",
    position: "relative",
  }} className="paper-texture">
    {children}
  </div>
);

// Wait until all babel scripts have registered their globals before mounting
const waitForGlobals = () => {
  const needed = ["LoginAdmin", "StandsList", "StandEditor", "QRPrintView", "ActivityLive", "VoteForm", "VoteConfirm", "Passport", "PublicDashboard", "PublicDetail", "PhoneFrame"];
  if (needed.every(k => window[k])) {
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  } else {
    setTimeout(waitForGlobals, 40);
  }
};
waitForGlobals();
</script>

</body>
</html>
